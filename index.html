<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f3ef;
    --board-bg: #d9cfc6;
    --cell-bg: #e8e0d8;
    --text-dark: #3a3028;
    --text-mid: #7a6e65;
    --accent: #e07a5f;
    --radius-board: 18px;
    --radius-tile: 12px;
    --gap: 12px;
    --tile-size: min(calc((min(96vw, 480px) - 5 * 12px) / 4), 100px);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px 40px;
    color: var(--text-dark);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ── Header ── */
  .header {
    width: min(96vw, 480px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .logo {
    font-size: 3rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -2px;
    line-height: 1;
  }

  .scores-wrap {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .score-box {
    background: var(--board-bg);
    border-radius: 10px;
    padding: 6px 16px;
    text-align: center;
    min-width: 70px;
  }
  .score-box .label {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-mid);
    text-transform: uppercase;
  }
  .score-box .value {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--text-dark);
    line-height: 1.2;
  }

  /* ── Controls row ── */
  .controls {
    width: min(96vw, 480px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .tagline {
    font-size: 0.82rem;
    color: var(--text-mid);
    font-weight: 600;
  }

  .btn-new {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 8px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.88rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    letter-spacing: 0.02em;
  }
  .btn-new:hover { opacity: 0.88; }
  .btn-new:active { transform: scale(0.96); }

  /* ── Board ── */
  .board-wrap {
    position: relative;
    width: min(96vw, 480px);
  }

  .board {
    background: var(--board-bg);
    border-radius: var(--radius-board);
    padding: var(--gap);
    display: grid;
    grid-template-columns: repeat(4, var(--tile-size));
    grid-template-rows: repeat(4, var(--tile-size));
    gap: var(--gap);
    box-shadow: 0 8px 32px rgba(58,48,40,0.13), 0 2px 8px rgba(58,48,40,0.08);
    width: fit-content;
    margin: 0 auto;
  }

  .cell {
    width: var(--tile-size);
    height: var(--tile-size);
    background: var(--cell-bg);
    border-radius: var(--radius-tile);
  }

  /* ── Tile layer ── */
  .tiles-layer {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  .tile {
    position: absolute;
    width: var(--tile-size);
    height: var(--tile-size);
    border-radius: var(--radius-tile);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    transition: left 0.12s ease, top 0.12s ease;
    will-change: left, top;
    z-index: 2;
  }

  .tile.new-tile {
    animation: popIn 0.18s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .tile.merge-tile {
    animation: mergePop 0.22s cubic-bezier(0.34,1.56,0.64,1) both;
    z-index: 3;
  }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  @keyframes mergePop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.18); }
    70%  { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  /* tile colours */
  .t2    { background:#f9d7e0; color:#5c3d45; }
  .t4    { background:#ddd6f7; color:#3d3760; }
  .t8    { background:#fddccc; color:#6b3a25; }
  .t16   { background:#f4a08a; color:#5c2010; }
  .t32   { background:#f2845a; color:#fff; }
  .t64   { background:#f5c842; color:#5c3d00; }
  .t128  { background:#7ecba1; color:#fff; }
  .t256  { background:#6dbfea; color:#fff; }
  .t512  { background:#9d74d4; color:#fff; }
  .t1024 { background:#d4956a; color:#fff; }
  .t2048 { background:#f0c040; color:#fff; box-shadow: 0 0 22px 4px rgba(240,192,64,0.45); }
  .t-high{ background:#3a3028; color:#fff; }

  /* font sizes inside tiles */
  .tile { font-size: calc(var(--tile-size) * 0.38); }
  .tile[data-v="128"],.tile[data-v="256"],.tile[data-v="512"] { font-size: calc(var(--tile-size) * 0.33); }
  .tile[data-v="1024"],.tile[data-v="2048"] { font-size: calc(var(--tile-size) * 0.27); }
  .tile[data-v-big] { font-size: calc(var(--tile-size) * 0.22); }

  /* ── Overlays ── */
  .overlay {
    display: none;
    position: absolute;
    inset: 0;
    border-radius: var(--radius-board);
    background: rgba(247,243,239,0.82);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    gap: 14px;
    animation: fadeIn 0.3s ease;
  }
  .overlay.show { display: flex; }

  @keyframes fadeIn {
    from { opacity:0; } to { opacity:1; }
  }

  .overlay h2 {
    font-size: 2rem;
    font-weight: 900;
    color: var(--text-dark);
  }
  .overlay p {
    font-size: 0.9rem;
    color: var(--text-mid);
    font-weight: 600;
  }
  .overlay .btn-new {
    margin-top: 6px;
    padding: 10px 28px;
    font-size: 1rem;
  }

  /* confetti canvas */
  #confetti-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border-radius: var(--radius-board);
    pointer-events: none;
    z-index: 19;
  }

  /* ── Score bump animation ── */
  .score-bump {
    animation: scoreBump 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes scoreBump {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.22); }
    100% { transform: scale(1); }
  }

  /* ── Keyboard hint ── */
  .hint {
    margin-top: 22px;
    width: min(96vw, 480px);
    text-align: center;
    font-size: 0.78rem;
    color: var(--text-mid);
    font-weight: 600;
  }
  .hint .keys {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    margin-top: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .key {
    background: var(--board-bg);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-dark);
    border-bottom: 2px solid #c2b8b0;
  }

  .mobile-hint { display: none; }
  @media (hover: none) and (pointer: coarse) {
    .desktop-hint { display: none; }
    .mobile-hint  { display: block; }
  }

  @media (prefers-reduced-motion: reduce) {
    .tile { transition: none; }
    .tile.new-tile, .tile.merge-tile { animation: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">2048</div>
  <div class="scores-wrap">
    <div class="score-box">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="label">Best</div>
      <div class="value" id="best">0</div>
    </div>
  </div>
</div>

<div class="controls">
  <span class="tagline">Join the tiles, reach <strong>2048!</strong></span>
  <button class="btn-new" id="btn-new">New Game</button>
</div>

<div class="board-wrap" id="board-wrap">
  <div class="board" id="board"></div>
  <div class="tiles-layer" id="tiles-layer"></div>
  <canvas id="confetti-canvas"></canvas>

  <div class="overlay" id="overlay-win">
    <h2>🎉 You Win!</h2>
    <p>You reached 2048! Keep going?</p>
    <button class="btn-new" id="btn-continue">Keep Playing</button>
    <button class="btn-new" id="btn-restart-win" style="background:#a09088">New Game</button>
  </div>

  <div class="overlay" id="overlay-over">
    <h2>Game Over</h2>
    <p>No moves left. Try again?</p>
    <button class="btn-new" id="btn-restart-over">New Game</button>
  </div>
</div>

<div class="hint desktop-hint">
  <div>Use keyboard or on-screen swipe to move tiles.</div>
  <div class="keys">
    <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span>
    &nbsp;or&nbsp;
    <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span>
  </div>
</div>
<div class="hint mobile-hint">Swipe in any direction to move tiles.</div>

<script>
(() => {
  /* ── Constants ── */
  const SIZE = 4;
  const GAP = 12; // matches --gap CSS

  /* ── State ── */
  let board = [];       // 4×4 array of values (0 = empty)
  let tileEls = {};     // id → DOM element
  let nextId = 1;
  let tileGrid = [];    // 4×4 array of {id, value} objects
  let score = 0;
  let best = +localStorage.getItem('2048-best') || 0;
  let won = false;
  let over = false;
  let moving = false;

  /* ── DOM refs ── */
  const boardEl      = document.getElementById('board');
  const tilesLayer   = document.getElementById('tiles-layer');
  const scoreEl      = document.getElementById('score');
  const bestEl       = document.getElementById('best');
  const overlayWin   = document.getElementById('overlay-win');
  const overlayOver  = document.getElementById('overlay-over');
  const boardWrap    = document.getElementById('board-wrap');
  const confCanvas   = document.getElementById('confetti-canvas');

  /* ── Build empty cell grid ── */
  for (let i = 0; i < SIZE * SIZE; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    boardEl.appendChild(cell);
  }

  /* ── Tile positioning helpers ── */
  function tileSize() {
    const cell = boardEl.querySelector('.cell');
    return cell ? cell.offsetWidth : 80;
  }

  function posFor(row, col) {
    const ts = tileSize();
    const boardRect = boardEl.getBoundingClientRect();
    const wrapRect  = boardWrap.getBoundingClientRect();
    const offsetX = boardRect.left - wrapRect.left;
    const offsetY = boardRect.top  - wrapRect.top;
    return {
      left: offsetX + GAP + col * (ts + GAP),
      top:  offsetY + GAP + row * (ts + GAP),
    };
  }

  /* ── Tile DOM ── */
  function colorClass(v) {
    if (v > 2048) return 't-high';
    return 't' + v;
  }

  function createTileEl(id, value, row, col) {
    const el = document.createElement('div');
    el.className = `tile ${colorClass(value)}`;
    el.dataset.id = id;
    el.dataset.v = value;
    if (value >= 10000) el.dataset.vBig = true;
    el.textContent = value;
    const ts = tileSize();
    el.style.width  = ts + 'px';
    el.style.height = ts + 'px';
    const pos = posFor(row, col);
    el.style.left = pos.left + 'px';
    el.style.top  = pos.top  + 'px';
    tilesLayer.appendChild(el);
    tileEls[id] = el;
    return el;
  }

  function moveTileEl(id, row, col) {
    const el = tileEls[id];
    if (!el) return;
    const pos = posFor(row, col);
    el.style.left = pos.left + 'px';
    el.style.top  = pos.top  + 'px';
  }

  function removeTileEl(id) {
    const el = tileEls[id];
    if (el) { el.remove(); delete tileEls[id]; }
  }

  function updateTileEl(id, value) {
    const el = tileEls[id];
    if (!el) return;
    el.textContent = value;
    el.dataset.v = value;
    el.className = `tile ${colorClass(value)} merge-tile`;
    if (value >= 10000) el.dataset.vBig = true;
  }

  /* ── Grid helpers ── */
  function emptyGrid() {
    return Array.from({length: SIZE}, () => Array(SIZE).fill(null));
  }

  function emptyCells() {
    const cells = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (!tileGrid[r][c]) cells.push([r, c]);
    return cells;
  }

  function spawnTile() {
    const cells = emptyCells();
    if (!cells.length) return;
    const [r, c] = cells[Math.floor(Math.random() * cells.length)];
    const value = Math.random() < 0.9 ? 2 : 4;
    const id = nextId++;
    tileGrid[r][c] = { id, value };
    const el = createTileEl(id, value, r, c);
    el.classList.add('new-tile');
  }

  /* ── Score ── */
  function addScore(n) {
    score += n;
    scoreEl.textContent = score;
    scoreEl.classList.remove('score-bump');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('score-bump');
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      localStorage.setItem('2048-best', best);
    }
  }

  /* ── Move logic ── */
  // Returns {newLine, score, merged} for a single row (left-shift)
  function shiftLeft(line) {
    const vals = line.filter(t => t);  // remove nulls
    const out = Array(SIZE).fill(null);
    let gained = 0;
    let i = 0, j = 0;
    while (j < vals.length) {
      if (j + 1 < vals.length && vals[j].value === vals[j+1].value) {
        const newVal = vals[j].value * 2;
        gained += newVal;
        out[i] = { ...vals[j], value: newVal, merged: true };
        // mark the consumed tile for removal
        out[i].consumed = vals[j+1].id;
        j += 2;
      } else {
        out[i] = vals[j];
        j++;
      }
      i++;
    }
    return { line: out, score: gained };
  }

  function rotateRight(grid) {
    return grid[0].map((_, c) => grid.map(row => row[c]).reverse());
  }
  function rotateLeft(grid) {
    return grid[0].map((_, c) => grid.map(row => row[SIZE-1-c]));
  }
  function flipH(grid) {
    return grid.map(row => [...row].reverse());
  }

  function move(dir) {
    if (moving || over) return;

    // Transform grid so we always shift "left"
    let g = tileGrid.map(r => [...r]);
    if (dir === 'right')  g = flipH(g);
    if (dir === 'up')     g = rotateRight(g);
    if (dir === 'down')   g = rotateLeft(g);

    let totalScore = 0;
    let changed = false;
    const toRemove = [];
    const toMerge  = [];

    for (let r = 0; r < SIZE; r++) {
      const result = shiftLeft(g[r]);
      if (JSON.stringify(g[r].map(t=>t&&t.value)) !== JSON.stringify(result.line.map(t=>t&&t.value))) changed = true;
      totalScore += result.score;
      result.line.forEach(t => {
        if (t && t.consumed) toRemove.push(t.consumed);
        if (t && t.merged)   toMerge.push(t.id);
      });
      g[r] = result.line;
    }

    // Reverse transforms
    if (dir === 'right')  g = flipH(g);
    if (dir === 'up')     g = rotateLeft(g);
    if (dir === 'down')   g = rotateRight(g);

    if (!changed) return;

    moving = true;

    // Remove consumed (bottom of merge) immediately but after transition
    toRemove.forEach(id => {
      const el = tileEls[id];
      if (el) el.style.zIndex = 1;  // goes under the surviving tile
    });

    // Update tileGrid and move elements
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const t = g[r][c];
        if (t) moveTileEl(t.id, r, c);
      }
    }

    // After slide transition, clean up
    setTimeout(() => {
      // Remove consumed tiles
      toRemove.forEach(id => removeTileEl(id));

      // Update merged tiles appearance
      toMerge.forEach(id => {
        // find new value
        for (let r = 0; r < SIZE; r++)
          for (let c = 0; c < SIZE; c++)
            if (g[r][c] && g[r][c].id === id)
              updateTileEl(id, g[r][c].value);
      });

      // Remove merged flags from tileGrid so they don't persist
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++)
          if (g[r][c]) { delete g[r][c].merged; delete g[r][c].consumed; }

      tileGrid = g;

      if (totalScore) addScore(totalScore);

      // Check win
      if (!won) {
        outer: for (let r = 0; r < SIZE; r++)
          for (let c = 0; c < SIZE; c++)
            if (tileGrid[r][c] && tileGrid[r][c].value >= 2048) {
              won = true;
              showWin();
              break outer;
            }
      }

      // Spawn new tile
      spawnTile();

      // Remove pop animation class after it fires
      Object.values(tileEls).forEach(el => {
        el.addEventListener('animationend', () => {
          el.classList.remove('new-tile', 'merge-tile');
        }, { once: true });
      });

      // Check game over
      if (!canMove()) {
        over = true;
        setTimeout(() => overlayOver.classList.add('show'), 300);
      }

      moving = false;
    }, 130);
  }

  function canMove() {
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (!tileGrid[r][c]) return true;
        const v = tileGrid[r][c].value;
        if (r+1 < SIZE && tileGrid[r+1][c] && tileGrid[r+1][c].value === v) return true;
        if (c+1 < SIZE && tileGrid[r][c+1] && tileGrid[r][c+1].value === v) return true;
      }
    }
    return false;
  }

  /* ── Init / Restart ── */
  function init() {
    // Clear
    tilesLayer.innerHTML = '';
    tileEls = {};
    nextId = 1;
    tileGrid = emptyGrid();
    score = 0;
    won = false;
    over = false;
    moving = false;
    scoreEl.textContent = 0;
    bestEl.textContent = best;
    overlayWin.classList.remove('show');
    overlayOver.classList.remove('show');
    stopConfetti();

    // Spawn 2 tiles
    spawnTile();
    spawnTile();
    // Remove pop from initial tiles (no animation wanted)
    Object.values(tileEls).forEach(el => el.classList.remove('new-tile'));
  }

  /* ── Win overlay ── */
  function showWin() {
    overlayWin.classList.add('show');
    startConfetti();
  }

  /* ── Confetti ── */
  let confettiRAF = null;
  const confCtx = confCanvas.getContext('2d');
  let pieces = [];

  function startConfetti() {
    const W = confCanvas.offsetWidth;
    const H = confCanvas.offsetHeight;
    confCanvas.width = W;
    confCanvas.height = H;
    pieces = Array.from({length: 80}, () => ({
      x: Math.random() * W,
      y: Math.random() * H - H,
      r: Math.random() * 6 + 4,
      d: Math.random() * 2 + 1,
      color: ['#f9d7e0','#ddd6f7','#f5c842','#7ecba1','#6dbfea','#f2845a','#9d74d4'][Math.floor(Math.random()*7)],
      tilt: Math.random() * 10 - 5,
      tiltV: Math.random() * 0.3 + 0.1,
      angle: Math.random() * Math.PI * 2,
      angleV: Math.random() * 0.08 + 0.02,
    }));
    function loop() {
      confCtx.clearRect(0, 0, W, H);
      pieces.forEach(p => {
        p.y += p.d;
        p.angle += p.angleV;
        p.tilt += p.tiltV;
        if (p.y > H) { p.y = -10; p.x = Math.random() * W; }
        confCtx.beginPath();
        confCtx.ellipse(p.x + p.tilt, p.y, p.r, p.r * 0.5, p.angle, 0, Math.PI * 2);
        confCtx.fillStyle = p.color;
        confCtx.fill();
      });
      confettiRAF = requestAnimationFrame(loop);
    }
    loop();
  }

  function stopConfetti() {
    if (confettiRAF) { cancelAnimationFrame(confettiRAF); confettiRAF = null; }
    confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
    pieces = [];
  }

  /* ── Keyboard ── */
  const KEY_MAP = {
    ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down',
    a:'left', d:'right', w:'up', s:'down',
    A:'left', D:'right', W:'up', S:'down',
  };

  document.addEventListener('keydown', e => {
    const dir = KEY_MAP[e.key];
    if (dir) { e.preventDefault(); move(dir); }
  });

  /* ── Touch / Swipe ── */
  let touchStartX = 0, touchStartY = 0;

  boardWrap.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  boardWrap.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 20) return;
    if (absDx > absDy)  move(dx > 0 ? 'right' : 'left');
    else                move(dy > 0 ? 'down'  : 'up');
  }, { passive: true });

  /* ── Buttons ── */
  document.getElementById('btn-new').addEventListener('click', init);
  document.getElementById('btn-continue').addEventListener('click', () => {
    overlayWin.classList.remove('show');
    stopConfetti();
  });
  document.getElementById('btn-restart-win').addEventListener('click', init);
  document.getElementById('btn-restart-over').addEventListener('click', init);

  /* ── Start ── */
  init();
})();
</script>
</body>
</html>
